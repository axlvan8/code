<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
</head>
<body>

    <script>
    var logo;
    class Example extends Phaser.Scene
    {
        preload ()
        {
            this.load.setBaseURL('https://labs.phaser.io');

            this.load.image('sky', 'assets/skies/space3.png');
            
            //this.load.image('logo', 'assets/sprites/phaser3-logo.png');
            this.load.image('green', 'assets/particles/green.png');
            //this.load.setBaseURL();
            this.load.image('logo', 'https://axlvan8.github.io/code/phaser/assets/Drawing.png');
        }

        create ()
        {
            this.add.image(400, 300, 'sky');

            const particles = this.add.particles(0, 0, 'green', {
                speed: 1,
                scale: { start: 1, end: -1 },
                blendMode: 'none'
            });

            logo = this.physics.add.image(400, 100, 'logo');

            logo.setVelocity(60, 205);
            logo.setBounce(1, 1);
            logo.setCollideWorldBounds(true);

            particles.startFollow(logo);
        }
    }

    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 800,
        scene: Example,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 20000 }
            }
        }
    };
    document.addEventListener('keydown', (e)=>{
        if(e.code === 'Space'){
            console.log('jump');
            //logo.setBounce(1, 0.5);
            logo.setVelocity(0, 3356);
        }
        if(e.code === 'KeyD'){
            console.log('right');
            logo.setVelocity(3000, 0);
        }
        if(e.code === 'KeyA'){
            console.log('left');
            logo.setVelocity(-3000, 0);
        }
        if(e.code === 'KeyS'){
            console.log('down');
            logo.setVelocity(0, -3000);
        }
        if(e.code === 'KeyR'){
            console.log('reset');
            logo.setPosition(400, 100);
        }
        if(e.code === 'KeyB'){
            console.log('bounce');
            logo.setBounce(1, 0.5);
        }
        if(e.code === 'KeyN'){
            console.log('no bounce');
            logo.setBounce(0, 0);
        }
        if(e.code === 'KeyG'){
            console.log('gravity');
            logo.setGravityY(20000);
        }
        if(e.code === 'KeyH'){
            console.log('no gravity');
            logo.setGravityY(0);
        }
        if(e.code === 'KeyC'){
            console.log('collide world bounds');
            logo.setCollideWorldBounds(true);
        }
        if(e.code === 'KeyV'){
            console.log('no collide world bounds');
            logo.setCollideWorldBounds(false);
        }
        if(e.code === 'KeyP'){
            console.log('pause');
            logo.body.enable = false;
        }
        if(e.code === 'KeyO'){
            console.log('resume');
            logo.body.enable = true;
        }
        if(e.code === 'KeyL'){
            console.log('log velocity');
            console.log(logo.body.velocity);
        }
        if(e.code === 'KeyK'){
            console.log('log position');
            console.log(logo.body.position);
        }
        if(e.code === 'KeyM'){
            console.log('log bounce');
            console.log(logo.body.bounce);
        }
        if(e.code === 'KeyQ'){
            console.log('log gravity');
            console.log(logo.body.gravity);
        }
        if(e.code === 'KeyW'){
            console.log('log collide world bounds');
            console.log(logo.body.collideWorldBounds);
        }
        if(e.code === 'KeyE'){
            console.log('log enable');
            console.log(logo.body.enable);
        }
        if(e.code === 'KeyT'){
            console.log('log all');
            console.log(logo.body);
        }
    })
    const game = new Phaser.Game(config);
    logo.setBounce(1, 0.5);
    </script>

</body>
</html>
