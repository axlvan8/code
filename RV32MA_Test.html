saveRAMBufferToFile(path, addr) {

    let text = "";
    let byte;

    while ((byte = this.read8(addr++)) !== 0) {
        text += String.fromCharCode(byte);
    }

    const parts = path.split("/");
    let current = this.files;

    for (let i = 0; i < parts.length - 1; i++) {
        current = current[parts[i]];
    }

    current[parts[parts.length - 1]] = text;

    this.saveFilesLocally();
}
    getFile(path) {
    const parts = path.split("/");
    let current = this.files;

    for (let part of parts) {
        if (!current[part]) return null;
        current = current[part];
    }

    return current;
}
readString(addr, maxLen = 1024) {
    let str = "";
    let byte;
    let count = 0;

    while (count < maxLen && (byte = this.read8(addr++)) !== 0) {
        str += String.fromCharCode(byte);
        count++;
    }

    if (count === maxLen) {
        throw new Error("String exceeds maximum length");
    }

    return str;
}

        this.fileExplorer.style.display="block";
        this.fileExplorer.setAttribute("src", file);

    /*read8(addr) {
        if (addr >= 0x00000000 && addr < 0x00010000) return this.rom[addr];
        if (addr >= 0x80000000 && addr <= 0x807FFFFF) return this.ram[addr - 0x80000000];
        if (addr === 0x10000000) return 0; // UART
        throw new Error("Invalid read at 0x" + addr.toString(16));
    }*/
    read8(addr) {

    if (addr >= 0x00000000 && addr < 0x00010000)return this.rom[addr];

        if (addr >= 0x80000000 && addr <= 0x807FFFFF)
            return this.ram[addr - 0x80000000];

        if (addr === 0x10000000) return 0; // UART out

        if (addr === 0x10000004) { // keyboard input
            if (this.inputBuffer.length === 0) return 0;
            return this.inputBuffer.shift();
        }

        throw new Error("Invalid read at 0x" + addr.toString(16));
    }
    write8(addr, value) {
        if (addr >= 0x00000000 && addr < 0x00010000) throw new Error("Write to ROM at 0x" + addr.toString(16));
        if (addr >= 0x80000000 && addr <= 0x807FFFFF) { 
            this.ram[addr - 0x80000000] = value;
            return;
        }
        if (addr === 0x10000000) { 
            this.output.textContent += String.fromCharCode(value);
            otherOut+=String.fromCharCode(value);
            return;
        }
        throw new Error("Invalid write at 0x" + addr.toString(16));
    }

    read32(addr) {
        return (
            this.read8(addr) |
            (this.read8(addr + 1) << 8) |
            (this.read8(addr + 2) << 16) |
            (this.read8(addr + 3) << 24)
        ) >>> 0;
    }

    write32(addr, value) {
        this.write8(addr, value & 0xff);
        this.write8(addr + 1, (value >> 8) & 0xff);
        this.write8(addr + 2, (value >> 16) & 0xff);
        this.write8(addr + 3, (value >> 24) & 0xff);
    }

    malloc32(value) {
    if (this.heap_ptr + 4 >= this.sp_init) {
        throw new Error("Out of memory: heap collided with stack");
    }

    const addr = this.heap_ptr;
    this.write32(addr, value);
    this.heap_ptr += 4;
    return addr;
}

loadFileToRAM(path, destAddr) {
    const file = this.getFile(path);

    if (!file || typeof file === "object") {
        throw new Error("Invalid file path: " + path);
    }

    const encoder = new TextEncoder();
    const bytes = encoder.encode(file);

    for (let i = 0; i < bytes.length; i++) {
        this.write8(destAddr + i, bytes[i]);
    }

    this.write8(destAddr + bytes.length, 0); // null terminate

    return bytes.length;
}

class RV32I {
    constructor(bus) {
        this.bus = bus;
        this.regs = new Uint32Array(32);
        this.pc = 0x00000000; // start in ROM
    }
    /*handleEcall() {
        const a7 = this.regs[17]; // SBI function ID
        const a0 = this.regs[10]; // first argument

        // SBI legacy console putchar = 1
        if (a7 === 1) {
            this.bus.write8(0x10000000, a0 & 0xff);
            return;
        }

        throw new Error("Unknown SBI call: " + a7);
    }*/
    /*handleEcall() {
    const a7 = this.regs[17];
    const a0 = this.regs[10];

    // Console putchar
    if (a7 === 1) {
        this.bus.write8(0x10000000, a0 & 0xff);
        return;
    }

    // File read syscall
    if (a7 === 2) {
        const path = this.bus.readString(a0);
        const dest = this.regs[11]; // a1

        const size = this.bus.loadFileToRAM(path, dest);

        this.regs[10] = size; // return file size in a0
        return;
    }

    throw new Error("Unknown SBI call: " + a7);
}*/
    handleEcall() {

        const a7 = this.regs[17];
        const a0 = this.regs[10];

        // putchar
        if (a7 === 1) {
            this.bus.write8(0x10000000, a0 & 0xff);
            return;
        }

        // getchar
        if (a7 === 3) {
            this.regs[10] = this.bus.read8(0x10000004);
            return;
        }

        throw new Error("Unknown syscall " + a7);
    }
    step() {
        const instr = this.bus.read32(this.pc);
        const oldPC = this.pc;
        this.pc += 4;

        const opcode = instr & 0x7f;

        switch (opcode) {
            case 0x03: { // LOAD
                const rd = (instr >> 7) & 0x1f;
                const funct3 = (instr >> 12) & 0x7;
                const rs1 = (instr >> 15) & 0x1f;
                let imm = instr >> 20;
                imm = (imm << 20) >> 20;
                const addr = (this.regs[rs1] + imm) >>> 0;

                if (funct3 === 0x2) { // LW
                    this.regs[rd] = this.bus.read32(addr);
                } else {
                    throw new Error("Unsupported LOAD funct3 0x" + funct3.toString(16));
                }
                break;
            }

            case 0x23: { // STORE (already partially implemented)
                const funct3 = (instr >> 12) & 0x7;
                const rs1 = (instr >> 15) & 0x1f;
                const rs2 = (instr >> 20) & 0x1f;

                let imm = ((instr >> 7) & 0x1f) | (((instr >> 25) & 0x7f) << 5);
                imm = (imm << 20) >> 20;

                const addr = (this.regs[rs1] + imm) >>> 0;

                if (funct3 === 0x0) { // SB
                    this.bus.write8(addr, this.regs[rs2] & 0xff);
                } else if (funct3 === 0x2) { // SW
                    this.bus.write32(addr, this.regs[rs2]);
                } else {
                    throw new Error("Unsupported STORE funct3 0x" + funct3.toString(16));
                }
                break;
            }
            /*case 0x23: { // STORE
                const funct3 = (instr >> 12) & 0x7;
                const rs1 = (instr >> 15) & 0x1f;
                const rs2 = (instr >> 20) & 0x1f;

                let imm =
                    ((instr >> 7) & 0x1f) |
                    (((instr >> 25) & 0x7f) << 5);

                imm = (imm << 20) >> 20;

                const addr = (this.regs[rs1] + imm) >>> 0;

                if (funct3 === 0x0) { // SB
                    this.bus.write8(addr, this.regs[rs2] & 0xff);
                }

                break;
            }*/
            case 0x37: { // LUI
                const rd = (instr >> 7) & 0x1f;
                const imm = instr & 0xfffff000;
                this.regs[rd] = imm >>> 0;
                break;
            }
            case 0x73: { // SYSTEM (ECALL)
                const funct3 = (instr >> 12) & 0x7;

                if (funct3 === 0x0) {
                    // ECALL
                    this.handleEcall();
                    break;
                }

                throw new Error("Unknown SYSTEM instruction");
            }

            case 0x13: { // ADDI
                const rd = (instr >> 7) & 0x1f;
                const rs1 = (instr >> 15) & 0x1f;
                let imm = instr >> 20;
                imm = (imm << 20) >> 20;
                this.regs[rd] = (this.regs[rs1] + imm) >>> 0;
                break;
            }

            case 0x63: { // BEQ
                const rs1 = (instr >> 15) & 0x1f;
                const rs2 = (instr >> 20) & 0x1f;

                let imm =
                    ((instr >> 31) << 12) |
                    (((instr >> 7) & 1) << 11) |
                    (((instr >> 25) & 0x3f) << 5) |
                    (((instr >> 8) & 0xf) << 1);

                imm = (imm << 19) >> 19;

                if (this.regs[rs1] === this.regs[rs2]) {
                    this.pc = (oldPC + imm) >>> 0;
                }
                break;
            }

           case 0x6f: { // JAL
                const rd = (instr >> 7) & 0x1f;

                let imm =
                    ((instr >> 31) << 20) |
                    (((instr >> 12) & 0xff) << 12) |
                    (((instr >> 20) & 1) << 11) |
                    (((instr >> 21) & 0x3ff) << 1);

                imm = (imm << 11) >> 11;

                this.regs[rd] = this.pc;
                this.pc = (oldPC + imm) >>> 0;
                break;
            }

            default:
                throw new Error("Unknown opcode 0x" + opcode.toString(16));
        }

        this.regs[0] = 0;
        return true;
    }
    printNumber(addr) {
        let num = this.bus.read32(addr);
        let str = num.toString();
        for (let i = 0; i < str.length; i++) {
            this.bus.write8(0x10000000, str.charCodeAt(i));
        }
        this.bus.write8(0x10000000, 10); // newline
    }
}

function openFileExplorer(path = currentPath) {
    fileHitboxes = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";

    const dir = bus.getFile(path);

    if (!dir || typeof dir !== "object") {
        ctx.fillText("Invalid directory", 20, 40);
        return;
    }

    currentPath = path;

    let y = 40;
    let index = 0;

    Object.keys(dir).forEach(key => {
        ctx.fillStyle = typeof dir[key] === "object"
            ? "rgb(100,200,255)"   // folder
            : "rgb(200,200,200)";  // file

        ctx.fillText(key, 40, y);

        // store clickable area
        fileHitboxes.push({
            name: key,
            path: path,
            x: 40,
            y: y - 18,
            width: ctx.measureText(key).width,
            height: 20
        });

        y += 30;
        index++;
    });
}
function sleep(ms) {
  return new Promise(resolve => {
    const start = Date.now();
    function check() {
      if (Date.now() - start >= ms) {
        resolve();
      } else {
        requestAnimationFrame(check);
      }
    }
    check();
  });
}

function drawApps() {
    ctx.clearRect(0,0,800,800);
    ctx.fillStyle='rgb(17,225,240)';
    ctx.fillRect(0,0,800,800);
        apps.forEach(app => {

 function detectClickOnApp(x, y) {

   function openTextEditor(path) {

    ctx.clearRect(0,0,800,800);
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,800,800);

    ctx.fillStyle = "black";
    ctx.font = "16px monospace";

    if (path) {
        const file = bus.getFile(path);

        if (typeof file === "string") {
            const encoder = new TextEncoder();
            const bytes = encoder.encode(file);

            for (let i = 0; i < bytes.length; i++) {
                bus.write8(editorBufferAddr + i, bytes[i]);
            }

            bus.write8(editorBufferAddr + bytes.length, 0);
        }
    }

    renderEditor();
}
function renderEditor() {

    ctx.fillStyle = "white";
    ctx.fillRect(0,0,800,800);

    ctx.fillStyle = "black";
    ctx.font = "16px monospace";
    
    let text = "";
    let addr = editorBufferAddr;
    let byte;

    while ((byte = bus.read8(addr++)) !== 0) {
        text += String.fromCharCode(byte);
    }

    const lines = text.split("\n");

    let y = 30;
    for (let line of lines) {
        ctx.fillText(line, 20, y);
        y += 20;
    }
}

function writeROM32(addr, value) {
    bus.rom[addr] = value & 0xff;
    bus.rom[addr + 1] = (value >> 8) & 0xff;
    bus.rom[addr + 2] = (value >> 16) & 0xff;
    bus.rom[addr + 3] = (value >> 24) & 0xff;
}

}

function openShell(){
    ctx.clearRect(0,0,800,800);
    ctx.fillStyle='white';
    ctx.font='10px Arial';
    // print >
    writeROM32(0x00,0x03E00513); // a0='>'
    writeROM32(0x04,0x00100893); // a7=1
    writeROM32(0x08,0x00000073); // ecall

    // getchar
    writeROM32(0x0C,0x00300893); // a7=3
    writeROM32(0x10,0x00000073); // ecall

    // print char
    writeROM32(0x14,0x00100893);
    writeROM32(0x18,0x00000073);

    // jump back
    writeROM32(0x1C,0xFE1FF06F);
    ctx.fillText("C:>_",100,100);
    ctx.fill();
    shell();
}

window.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
    if (openedFilePath) {
        bus.saveRAMBufferToFile(openedFilePath, editorBufferAddr);
        alert("File saved.");
    }
    return;
    }
    if (e.ctrlKey && e.key === "l") {
    e.preventDefault();
    if (openedFilePath) {
        bus.loadFilesFromLocalStorage();
        alert("File loaded");
    }
    return;
    }
    if (!openedFilePath) return;

    let addr = editorBufferAddr;
    let byte;

    // find end of string
    while ((byte = bus.read8(addr)) !== 0) {
        addr++;
    }

    if (e.key.length === 1) {
        bus.write8(addr, e.key.charCodeAt(0));
        bus.write8(addr + 1, 0);
    }

    if (e.key === "Backspace") {
        if (addr > editorBufferAddr) {
            bus.write8(addr - 1, 0);
        }
    }

    if (e.key === "Enter") {
        bus.write8(addr, 10);
        bus.write8(addr + 1, 0);
    }

    renderEditor();
});
