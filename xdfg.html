class tree extends GameObject {
  update() {
    const dx = wx - x;
    const dy = wy - y;

    const sin = Math.sin(dir[0]);
    const cos = Math.cos(dir[0]);

    // camera space
    this.camX = dx * cos - dy * sin;
    this.camY = dx * sin + dy * cos;

    if (this.camY <= 0.1) {
      this.visible = false;
      return;
    }

    this.visible = true;

    const scale = cam.buffer / this.camY;

    this.trunkW = this.width * scale;
    this.trunkH = this.height * scale;
    this.leafSize = this.trunkW * 2.2;

    this.screenX =
      this.camX * scale / cam.clipping + canvas.width / 2;

    // ground anchored
    this.screenY = canvas.height / 2 + playerY * scale + horizon;
    // how "side-on" the tree is (−1 … 1)
    this.side = Math.max(-1, Math.min(1, this.camX / this.camY));
  }

  draw(){

    const baseX = this.x;
    const baseZ = this.y;

    // ---- trunk (4 blocks tall) ----
    for(let i=0;i<4;i++){
        drawRealCube(
            baseX,
            i*34,
            baseZ,
            34,
            "brown"
        );
    }

    // ---- leaves layer 1 ----
    for(let lx=-1; lx<=1; lx++){
        for(let lz=-1; lz<=1; lz++){
            drawRealCube(
                baseX + lx*34,
                4*34,
                baseZ + lz*34,
                34,
                "green"
            );
        }
    }

    // ---- leaves top ----
    drawRealCube(
        baseX,
        5*34,
        baseZ,
        34,
        "green"
    );
}
}

  min = Math.ceil(min);
  max = Math.floor(max);
  return Math.floor(Math.random() * (max - min)) + min; // The maximum is exclusive and the minimum is inclusive
}

class movingBlock extends GameObject {
  update() {
    const dx = this.x - x;
    const dy = this.y - y;

    const sin = Math.sin(dir[0]);
    const cos = Math.cos(dir[0]);

    // camera space
    this.camX = dx * cos - dy * sin;
    this.camY = dx * sin + dy * cos;

    if (this.camY <= 0.1) {
      this.visible = false;
      return;
    }
    this.x += (Math.random()-0.5)*0.8;
    this.y += (Math.random()-0.5)*0.8;

    const scale = cam.buffer / this.camY;

    this.trunkW = this.width * scale;
    this.trunkH = this.height * scale - 1;
    this.leafSize = this.trunkW * 2.2;

    this.screenX =
      this.camX * scale / cam.clipping + canvas.width / 2;

    // ground anchored
    this.screenY =
      canvas.height / 2 + playerY * scale + horizon;

    // how "side-on" the tree is (−1 … 1)
    this.side = Math.max(-1, Math.min(1, this.camX / this.camY));
  }

  draw() {
    if (!this.visible) return;
    const ctx = this.ctx;

    const sideOffset = this.trunkW * this.side * 0.6;
    const darker = this.side > 0 ? 0.25 : 0.1;

    /* ───── trunk front ───── */
    ctx.fillStyle = "rgb(120,80,40)";
    ctx.fillRect(
      this.screenX - this.trunkW / 2,
      this.screenY - this.trunkH,
      this.trunkW,
      this.trunkH
    );

    /* ───── trunk side (fake depth) ───── */
    ctx.fillStyle = `rgba(0,0,0,${darker})`;
    ctx.fillRect(
      this.screenX + sideOffset,
      this.screenY - this.trunkH,
      this.trunkW * 0.4,
      this.trunkH
    );

    
    /* ───── ground shadow ───── */
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(
      this.screenX - this.trunkW,
      this.screenY - 2,
      this.trunkW * 2,
      4
    );
  }
}

function raycastBlock(maxDist = 140, step = 2) {
  const sin = Math.sin(dir[0]);
  const cos = Math.cos(dir[0]);

  let rx = x;
  let ry = y;

  let lastTileX = Math.floor(rx / 34);
  let lastTileY = Math.floor(ry / 34);

  for (let d = 0; d < maxDist; d += step) {
    rx += sin * step;
    ry += cos * step;

    const tileX = Math.floor(rx / 34);
    const tileY = Math.floor(ry / 34);
    
    // only check when entering a new tile
    if (tileX !== lastTileX || tileY !== lastTileY) {
      const idx = tileX + tileY * grdw;
      
      if (idx >= 0 && idx < blockMap.length) {
        if (blockMap[idx] !== BLOCK.AIR) {
          
          return {
            hitIndex: idx,
            hitX: tileX,
            hitY: tileY,
            prevX: lastTileX,
            prevY: lastTileY
          };
        }
      }

      lastTileX = tileX;
      lastTileY = tileY;
    }
  }
  return null;
}

function breakBlock() {
  const hit = raycastBlock();
  if (!hit) return;

  blockMap[hit.hitIndex] = BLOCK.AIR;
  grid[hit.hitIndex] = blockToColor(BLOCK.AIR);
}


function placeBlock() {
  const hit = raycastBlock();
  if (!hit) return;

  const idx = hit.prevX + hit.prevY * grdw;
  if (idx < 0 || idx >= blockMap.length) return;
  if (blockMap[idx] !== BLOCK.AIR) return;

  // example: use selected hotbar slot
  const blockType =
    selectedSlot === 0 ? BLOCK.DIRT :
    selectedSlot === 1 ? BLOCK.STONE :
    BLOCK.GRASS;

  blockMap[idx] = blockType;
  grid[idx] = blockToColor(blockType);
}

function blockToColor(block) {
  switch (block) {
    case BLOCK.GRASS: return 35;
    case BLOCK.DIRT:  return 40;
    case BLOCK.STONE: return 50;
    default:          return 0; // AIR
  }
}

  return new Promise(resolve => {
    const interval = setInterval(async () => {
      await actionFn();
      if (conditionFn()) {
        clearInterval(interval);
        resolve();
      }
    }, intervalMs);
  });
}

  return new Promise(resolve => {
    const interval = setInterval(() => {
      if (conditionFn()) {

function findInsertIndex(arr, value) {
  let i = 0;
  while (i < arr.length && arr[i] < value) {
    i++;
  }
  return i;
}

function generateGrid() {
  grid = [];
  blockMap = [];

  for (let i = 0; i < grdw * grdw; i++) {
    blockMap[i] = Math.random() > 0.5 ? BLOCK.GRASS : BLOCK.DIRT;
    grid[i] = blockToColor(blockMap[i]);
  }
}

    function drawFloor() {
      resolution=4;
  // Direction vector
  dir[1] = Math.sin(dir[0]);
  dir[2] = Math.cos(dir[0]);

  // Camera plane (perpendicular to direction)
  plane[0] = Math.sin(dir[0] + Math.PI / 2);
  plane[1] = Math.cos(dir[0] + Math.PI / 2);

  // Start drawing from horizon downwards
  for (let dy = horizon; dy < canvas.height; dy += resolution) {

    // Perspective depth (your math)
    let rowDepth = (playerY + playerZ) * (180 / (dy - horizon));

    // World position at left edge
    let wx = x + rowDepth * (dir[1] - plane[0]);
    let wy = y + rowDepth * (dir[2] - plane[1]);

    // Step per column
    let wsx = (plane[0] * rowDepth) / 240;
    let wsy = (plane[1] * rowDepth) / 240;

    // Draw row
    for (let dx = -300; dx < 300; dx += resolution) {

      let tileX = Math.floor(wx / 34);
      let tileY = Math.floor(wy / 34);
      let idx =
        ((tileX + tileY * grdw) % grid.length + grid.length) % grid.length;

      ctx.fillStyle = penColor(grid[idx]);

      // Convert from center-origin to canvas coordinates
      ctx.fillRect(
        dx + canvas.width / 2,
        dy + canvas.height / 2,
        resolution,
        resolution
      );

      wx += wsx * resolution;
      wy += wsy * resolution;
    }
  }
}
function getRandomIntInclusive(min, max) {
  // Use Math.ceil() on min and Math.floor() on max to handle potential non-integer inputs
  const minCeiled = Math.ceil(min);
  const maxFloored = Math.floor(max);
  // The expression generates a number in the range [min, max] with uniform distribution
  return Math.floor(Math.random() * (maxFloored - minCeiled + 1)) + minCeiled;
}

function drawRealCube(cx, cy, cz, size, tex){
    const hs = size/2;

    const verts = [
        {x:cx-hs,y:cy-hs,z:cz-hs},
        {x:cx+hs,y:cy-hs,z:cz-hs},
        {x:cx+hs,y:cy+hs,z:cz-hs},
        {x:cx-hs,y:cy+hs,z:cz-hs},

        {x:cx-hs,y:cy-hs,z:cz+hs},
        {x:cx+hs,y:cy-hs,z:cz+hs},
        {x:cx+hs,y:cy+hs,z:cz+hs},
        {x:cx-hs,y:cy+hs,z:cz+hs},
    ];

    const proj=[];

    const sin=Math.sin(dir[0]);
    const cos=Math.cos(dir[0]);

    for(let v of verts){

        const dx=v.x-x;
        const dy=v.y-(playerY+playerZ);
        const dz=v.z-y;

        const rx=dx*cos-dz*sin;
        var rz=dx*sin+dz*cos;

        if(rz <= 1) rz = 1;

        const scale=500/rz;

        proj.push({
            x:canvas.width/2+rx*scale,
            y:canvas.height/2-dy*scale+horizon,
            z:rz
        });
    }

    const faces=[
        [0,1,2,3], // back
        [4,5,6,7], // front
        [0,4,7,3], // left
        [1,5,6,2], // right
        [3,2,6,7], // top
        [0,1,5,4]  // bottom
    ];

    const shade=[0.6,1,0.75,0.5,1.2,0.4];

    for(let f=0;f<6;f++){

        const face=faces[f];
        const a = proj[face[0]];
const b = proj[face[1]];
const c = proj[face[2]];

const cross =
  (b.x - a.x) * (c.y - a.y) -
  (b.y - a.y) * (c.x - a.x);

if(cross < 0) continue;
        ctx.beginPath();
        ctx.moveTo(proj[face[0]].x,proj[face[0]].y);

        for(let i=1;i<4;i++)
            ctx.lineTo(proj[face[i]].x,proj[face[i]].y);

        ctx.closePath();

        const s=shade[f]*255;

        ctx.fillStyle=`rgb(${s},${s},${s})`;
        ctx.fill();
    }
}

function applyLighting(baseColor, dist){

  light = Math.max(0.2,light);

  let r=((num>>16)&255)*light;

function drawCube(cx, cy, size, height, color){

  const dx = cx - x;
  const dy = cy - y;

  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist > 600) return;

  const angle = Math.atan2(dx,dy) - dir[0];

  const screenX =
    canvas.width/2 +
    (angle/(Math.PI/3))*canvas.width;

  const scale = 500/dist;

  const w = size*scale;
  const h = height*scale;

  const topY = canvas.height/2 + z - h + horizon;

  // TOP
  ctx.fillStyle = color;
  ctx.fillRect(screenX-w/2, topY, w, w/2);

  // LEFT SIDE
  ctx.fillStyle = shadeColor(color,-20);
  ctx.fillRect(screenX-w/2, topY+w/2, w/2, h);

  // RIGHT SIDE
  ctx.fillStyle = shadeColor(color,-40);
  ctx.fillRect(screenX, topY+w/2, w/2, h);

}
function shadeColor(color,percent){
  const num = parseInt(color.replace("#",""),16);
  let r=(num>>16)+percent;
  let g=((num>>8)&0x00FF)+percent;
  let b=(num&0x0000FF)+percent;

  r=Math.max(0,Math.min(255,r));
  g=Math.max(0,Math.min(255,g));
  b=Math.max(0,Math.min(255,b));

  return `rgb(${r},${g},${b})`;
}

function tri(Ax,Ay,Bx,By,Cx,Cy){
  ctx.closePath();
  len.a=((((Bx-Cx)**2)+((By-Cy)**2)))**0.5;
  len.b=((((Ax-Cx)**2)+((Ay-Cy)**2)))**0.5;
  len.c=((((Ax-Bx)**2)+((Ay-By)**2)))**0.5;
  peri=len.a+len.b+len.c;
  inc.x=(((len.a*Ax)+(len.b*Bx))+(len.c*Cx)/peri);
  inc.y=(((len.a*Ay)+(len.b*By))+(len.c*Cy)/peri);
  inc.ind=((((len.b+len.c)-len.a)*((len.c+len.a)-len.b)))**0.5;
  Ao.x=inc.x-Ax;
  Ao.Y=inc.y-Ay;
  Bo.x=inc.x-Bx;
  Bo.Y=inc.y-By;
  Co.x=inc.x-Cx;
  Co.y=inc.y-Cy;
  if((len.a<len.b)&&(len.a<len.c)){
    td=((Ao.x**2)+(Ao.y**2))**0.5;
  }else if(!(len.a<len.b)&&(len.b>len.c)){
    td=((Bo.x**2)+(Bo.y**2))**0.5;
  }else{
    td=((Co.x**2)+(Co.y**2))**0.5;
  }
  rate=(((td*2)-inc.ind)/(td*4));
  ctx.moveTo(inc.x,inc.y);
  resolution=inc.ind;
  ctx.beginPath();
  ctx.arc(inc.x,inc.y,inc.ind,0,359,false);
  ctx.closePath();
  td=1;
  for(var gfugd=0;gfugd<(Math.ceil(((Math.log(2/inc.ind))/Math.log(rate))+0.5));gfugd++){
    td*=rate;
    resolution=(td*ind)+1;
    ctx.closePath();
    ctx.moveTo((Ao.x*td)+Ax,(Ao.y*td)+Ay);
    ctx.beginPath();
    ctx.lineTo((Bo.x*td)+Bx,(Bo.y*td)+By);
    ctx.lineTo((Co.x*td)+Cx,(Co.y*td)+Cy);
    ctx.lineTo((Ao.x*td)+Ax,(Ao.y*td)+Ay);
  }
}

function drawWalls(){

  const FOV = Math.PI / 3;
  const rays = canvas.width;

  for(let i=0;i<rays;i+=6){

    const rayAngle = dir[0] - FOV/2 + (i/rays)*FOV;

    const sin = Math.sin(rayAngle);
    const cos = Math.cos(rayAngle);

    let dist = 0;
    let hit = false;

    while(!hit && dist < 400){

      dist += 2;

      const rx = x + sin * dist;
      const ry = y + cos * dist;

      const tileX = Math.floor(rx/34);
      const tileY = Math.floor(ry/34);

      const idx = tileX + tileY*grdw;

      if(idx>=0 && idx<blockMap.length){

        if(blockMap[idx] !== BLOCK.AIR){

          hit = true;

          const wallHeight = 800/dist;

          let shade = 255 - dist*0.8;
          shade = Math.max(60,shade);

          ctx.fillStyle = `rgb(${shade},${shade},${shade})`;

          ctx.fillRect(
            i,
            canvas.height/2 + playerZ  - wallHeight/2 + horizon,
            2,
            wallHeight
          );

        }

      }

    }

  }

}

        if(!darknessSu==255){
          darknessSk+=0.1;darknessSw=false;
        }else if(darknessSu==255){
          darknessSw=true;
          darknessSk-=0.2;
        }
        if(darknessSw){
          darknessSk-=0.2;
        }

    },100)
    canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  selectedSlot += Math.sign(e.deltaY);
  selectedSlot = (selectedSlot + 9) % 9;
});
canvas.addEventListener("mousedown", (e) => {
  if (e.button === 0) breakBlock();     // left click
  if (e.button === 2) placeBlock();     // right click
});

canvas.addEventListener("contextmenu", (e) => {
  e.preventDefault();
});
canvas.addEventListener("click", () => {
  canvas.requestPointerLock();
});
    document.addEventListener('keydown',(e)=>{handleKeys(e)})
    document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement === canvas) {

    const sensitivity = 0.001;

    dir[0] += e.movementX * sensitivity; // left/right

    horizon += e.movementY * 0.2; // look up/down
    horizon = Math.max(-80, Math.min(80, horizon));

  }
});

  console.log("Gamepad connected:", e.gamepad);
});
window.addEventListener("gamepaddisconnected", (e)=>{

});
